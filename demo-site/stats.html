<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>pinch-type — Analytics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",system-ui,sans-serif;background:#fafafa;color:#111;padding:2rem;max-width:800px;margin:0 auto;line-height:1.6}
h1{font-size:1.5rem;font-weight:400;margin-bottom:.3rem}
.sub{color:#999;font-size:.85rem;margin-bottom:2rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:6px;padding:1.25rem}
.card .val{font-size:2rem;font-weight:600;line-height:1.2}
.card .label{font-size:.75rem;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-top:.2rem}
h2{font-size:1.1rem;font-weight:500;margin:2rem 0 .75rem}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e5e5;border-radius:6px;overflow:hidden;font-size:.85rem}
th,td{padding:.6rem 1rem;text-align:left;border-bottom:1px solid #f0f0f0}
th{background:#f5f5f5;font-weight:500;color:#666;font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}
.bar-wrap{height:6px;background:#f0f0f0;border-radius:3px;width:100%;max-width:200px}
.bar{height:100%;background:#111;border-radius:3px}
.empty{color:#bbb;text-align:center;padding:2rem}
a{color:#111}
.note{color:#bbb;font-size:.75rem;margin-top:2rem;text-align:center}
</style>
</head>
<body>
<h1>📊 pinch-type analytics</h1>
<p class="sub">Local device stats (stored in your browser)</p>

<div class="cards" id="cards"></div>

<h2>Mode Popularity</h2>
<table id="modes-table"><thead><tr><th>Mode</th><th>Switches</th><th></th></tr></thead><tbody id="modes"></tbody></table>

<h2>Recent Events</h2>
<table id="events-table"><thead><tr><th>Time</th><th>Event</th><th>Detail</th></tr></thead><tbody id="events"></tbody></table>

<p class="note">Data is per-device (localStorage). <a href="/">← Back to demo</a></p>

<script>
(function(){
  var S = 'pt_analytics';
  var d;
  try { d = JSON.parse(localStorage.getItem(S)); } catch(e) {}
  if (!d) { document.getElementById('cards').innerHTML='<p class="empty">No data yet. Visit the <a href="/">demo page</a> first.</p>'; return; }

  var ev = d.events || [];
  var githubClicks = ev.filter(function(e){return e.t==='github-click'}).length;
  var pageviews = ev.filter(function(e){return e.t==='pageview'}).length;

  // Cards
  document.getElementById('cards').innerHTML =
    card(d.totalViews, 'Total Page Views') +
    card(d.sessions, 'Sessions') +
    card(githubClicks, 'GitHub Clicks') +
    card(pageviews, 'Tracked Views');

  function card(v,l){return '<div class="card"><div class="val">'+v+'</div><div class="label">'+l+'</div></div>';}

  // Mode popularity
  var modes = {};
  ev.forEach(function(e){ if(e.t==='mode-switch'&&e.d) modes[e.d]=(modes[e.d]||0)+1; });
  var mb = document.getElementById('modes');
  var modeMax = Math.max.apply(null, Object.values(modes).concat([1]));
  var modeKeys = Object.keys(modes).sort(function(a,b){return modes[b]-modes[a]});
  if(!modeKeys.length) mb.innerHTML='<tr><td colspan="3" class="empty">No mode switches yet</td></tr>';
  else modeKeys.forEach(function(k){
    var pct = Math.round(modes[k]/modeMax*100);
    mb.innerHTML += '<tr><td><strong>'+k+'</strong></td><td>'+modes[k]+'</td><td><div class="bar-wrap"><div class="bar" style="width:'+pct+'%"></div></div></td></tr>';
  });

  // Recent events (last 20)
  var eb = document.getElementById('events');
  var recent = ev.slice(-20).reverse();
  if(!recent.length) eb.innerHTML='<tr><td colspan="3" class="empty">No events</td></tr>';
  else recent.forEach(function(e){
    var t = new Date(e.ts);
    var ts = t.toLocaleDateString()+' '+t.toLocaleTimeString();
    eb.innerHTML += '<tr><td>'+ts+'</td><td>'+e.t+'</td><td>'+(e.d||'—')+'</td></tr>';
  });
})();
</script>
</body>
</html>
